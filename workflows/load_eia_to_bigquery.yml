name: Load EIA Data to BigQuery

on:
  schedule:
    # Daily at 6:00 AM UTC 
    # (we chose this because EIA typically publishes previous day's data at this time)
    - cron: "0 6 * * *"
  # Support manual trigger for testing
  workflow_dispatch:
    inputs:
      data_source:
        description: "Which dataset to load: 'fuel' or 'region'"
        required: false
        default: "fuel"

jobs:
  load_fuel:
    name: Load EIA fuel data
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Load fuel data to BigQuery
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          EIA_DATA_SOURCE: "fuel"
        run: python load_daily_eia_to_bigquery.py

  load_region:
    name: Load EIA region data
    runs-on: ubuntu-latest
    needs: load_fuel
    if: always()
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Load region data to BigQuery
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          EIA_DATA_SOURCE: "region"
        run: python load_daily_eia_to_bigquery.py